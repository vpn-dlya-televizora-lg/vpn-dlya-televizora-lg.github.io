<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B6CF5"/>
      <stop offset="100%" stop-color="#00E5BE"/>
    </linearGradient>
    <linearGradient id="shld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#B39BFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- TV body -->
  <rect x="3.5" y="6" width="25" height="17" rx="2.5" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="1.8"/>
  <!-- TV screen -->
  <rect x="5.5" y="8" width="21" height="13" rx="1.5" fill="rgba(0,0,0,0.5)"/>
  <!-- TV stand neck -->
  <rect x="13.5" y="23" width="5" height="2" rx="1" fill="rgba(255,255,255,0.65)"/>
  <!-- TV stand base -->
  <rect x="11" y="25" width="10" height="1.8" rx="0.9" fill="rgba(255,255,255,0.5)"/>
  <!-- Shield on screen -->
  <path d="M16 9.2 L20 11 L20 15 Q20 17.8 16 19.2 Q12 17.8 12 15 L12 11 Z" fill="url(#shld)" filter="url(#glow)"/>
  <!-- Lock body -->
  <rect x="14.3" y="14.5" width="3.4" height="2.8" rx="0.7" fill="#5C4AC7"/>
  <!-- Lock shackle -->
  <path d="M14.9 14.5 L14.9 13.3 Q14.9 11.8 16 11.8 Q17.1 11.8 17.1 13.3 L17.1 14.5" fill="none" stroke="#5C4AC7" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="16" cy="15.7" r="0.65" fill="rgba(255,255,255,0.85)"/>
  <rect x="15.6" y="16.1" width="0.8" height="0.9" rx="0.2" fill="rgba(255,255,255,0.85)"/>
</svg>
